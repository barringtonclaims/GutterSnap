<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Quote - GutterSnap Chicago</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #FFF5ED 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .acceptance-container {
            max-width: 800px;
            margin: 40px auto;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-header img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
        }

        .logo-header h1 {
            font-size: 2.5rem;
            color: #EE9844;
            margin: 0;
        }

        .quote-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .card-header {
            background: #EE9844;
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }

        .card-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .card-header p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card-body {
            padding: 40px;
        }

        .quote-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .quote-info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .quote-info-row:last-child {
            border-bottom: none;
        }

        .quote-info-row strong {
            color: #333;
        }

        .options-section {
            margin: 30px 0;
        }

        .options-section h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4rem;
        }

        .option-card {
            background: #ffffff;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            border-color: #EE9844;
            box-shadow: 0 5px 20px rgba(238, 152, 68, 0.2);
        }

        .option-card.selected {
            border-color: #EE9844;
            background: #FFF5ED;
        }

        .option-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .option-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .option-radio {
            width: 24px;
            height: 24px;
            min-width: 24px;
        }

        .option-header h4 {
            margin: 0;
            font-size: 1.3rem;
            color: #333;
        }

        .option-description {
            color: #666;
            margin: 0 0 15px 39px;
            font-size: 0.95rem;
        }

        .option-pricing {
            margin: 15px 0 0 39px;
        }

        .pricing-line {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            color: #666;
        }

        .pricing-line.total {
            font-size: 1.4rem;
            font-weight: 700;
            color: #EE9844;
            border-top: 2px solid #EE9844;
            margin-top: 10px;
            padding-top: 10px;
        }

        .features-list {
            background: #E8F5E9;
            border-left: 4px solid #4CAF50;
            padding: 20px;
            border-radius: 8px;
            margin: 30px 0;
        }

        .features-list h4 {
            margin: 0 0 15px 0;
            color: #2E7D32;
        }

        .features-list ul {
            margin: 0;
            padding-left: 20px;
        }

        .features-list li {
            padding: 5px 0;
            color: #2E7D32;
        }

        .acceptance-form {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #EE9844;
            box-shadow: 0 0 0 3px rgba(238, 152, 68, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
        }

        .checkbox-group label {
            font-size: 0.95rem;
            color: #333;
        }

        .submit-btn {
            width: 100%;
            background: #4CAF50;
            color: #ffffff;
            border: none;
            padding: 18px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover:not(:disabled) {
            background: #388E3C;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .decline-btn {
            width: 100%;
            background: #666;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .decline-btn:hover {
            background: #444;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #E8F5E9;
            border: 1px solid #66BB6A;
            color: #2E7D32;
        }

        .alert-error {
            background: #FFEBEE;
            border: 1px solid #EF5350;
            color: #C62828;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #EE9844;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .card-body {
                padding: 25px 20px;
            }

            .option-pricing {
                margin-left: 0;
            }

            .option-description {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="acceptance-container">
        <div class="logo-header">
            <img src="logo.png" alt="GutterSnap Logo">
            <h1>GutterSnap</h1>
        </div>

        <div id="alertContainer"></div>

        <!-- Loading State -->
        <div id="loadingState" class="quote-card" style="display: none;">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p style="margin-top: 20px; color: #666;">Loading your quote...</p>
            </div>
        </div>

        <!-- Quote Content -->
        <div id="quoteContent" class="quote-card" style="display: none;">
            <div class="card-header">
                <h2>Your GutterSnap Quote</h2>
                <p id="quoteSubheader"></p>
            </div>

            <div class="card-body">
                <div class="quote-info" id="quoteInfo"></div>

                <div class="options-section" id="optionsSection"></div>

                <div class="features-list">
                    <h4>✓ Included with All Options:</h4>
                    <ul>
                        <li>Lifetime warranty on materials and workmanship</li>
                        <li>Professional installation by certified technicians</li>
                        <li>Free annual maintenance inspection</li>
                        <li>24/7 customer support</li>
                    </ul>
                </div>

                <form id="acceptanceForm" class="acceptance-form">
                    <div class="form-group">
                        <label for="customerName">Full Name *</label>
                        <input type="text" id="customerName" required readonly>
                    </div>

                    <div class="form-group">
                        <label for="customerEmail">Email Address *</label>
                        <input type="email" id="customerEmail" required readonly>
                    </div>

                    <div class="form-group">
                        <label for="customerSignature">Signature (Type Your Full Name) *</label>
                        <input type="text" id="customerSignature" placeholder="Type your full name as signature" required>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="acceptTerms" required>
                        <label for="acceptTerms">
                            I accept this quote and authorize GutterSnap Chicago to proceed with the work as specified. I understand this quote is valid for 30 days.
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn" disabled>
                        Confirm & Accept Quote
                    </button>

                    <button type="button" class="decline-btn" id="declineBtn">
                        Not Interested Right Now
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="accept-quote.js"></script>
</body>
</html>
